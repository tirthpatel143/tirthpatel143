name: Generate Contribution Snake

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # ✅ STEP 1: Checkout repository
      - name: Checkout repo
        uses: actions/checkout@v4

      # ✅ STEP 2: Generate snake
      - name: Generate snake
        uses: Platane/snk@v3
        with:
          github_user_name: tirthpatel143
          outputs: |
            dist/github-contribution-grid-snake.svg

      # ✅ STEP 3: Deploy to output branch
      - name: Deploy snake
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: output
          folder: dist
